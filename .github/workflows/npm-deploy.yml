name: NPM Deploy

on:
  push:
    branches:
      - main
    tags:
      - deploy-*
      - dev-*
      - rc-*

env:
  PROJECT_COMMIT: ${{ github.sha }}
  PROJECT_ENV: meta
  PROJECT_SERVICE: libraries

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: NPM Deploy
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Publish dev packages
        if: startsWith(github.ref, 'refs/tags/dev-')
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              private=$(node -p "require('./$pkg/package.json').private || false")
              if [ "$private" != "true" ]; then
                name=$(node -p "require('./$pkg/package.json').name")
                version=$(node -p "require('./$pkg/package.json').version")
                # Only process dev versions
                if [[ "$version" == *"-dev."* ]]; then
                  if ! npm view "$name@$version" version >/dev/null 2>&1; then
                    echo "Publishing $name@$version with tag dev"
                    npm publish "$pkg" --provenance --tag dev
                  else
                    echo "Skipping $name@$version (already published)"
                  fi
                fi
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish RC packages
        if: startsWith(github.ref, 'refs/tags/rc-')
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              private=$(node -p "require('./$pkg/package.json').private || false")
              if [ "$private" != "true" ]; then
                name=$(node -p "require('./$pkg/package.json').name")
                version=$(node -p "require('./$pkg/package.json').version")
                # Only process RC versions
                if [[ "$version" == *"-rc."* ]]; then
                  if ! npm view "$name@$version" version >/dev/null 2>&1; then
                    echo "Publishing $name@$version with tag rc"
                    npm publish "$pkg" --provenance --tag rc
                  else
                    echo "Skipping $name@$version (already published)"
                  fi
                fi
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish packages to npm
        if: ${{ !startsWith(github.ref, 'refs/tags/rc-') && !startsWith(github.ref, 'refs/tags/dev-') }}
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              private=$(node -p "require('./$pkg/package.json').private || false")
              if [ "$private" != "true" ]; then
                name=$(node -p "require('./$pkg/package.json').name")
                version=$(node -p "require('./$pkg/package.json').version")
                if ! npm view "$name@$version" version >/dev/null 2>&1; then
                  echo "Publishing $name@$version"
                  npm publish "$pkg" --provenance
                else
                  echo "Skipping $name@$version (already published)"
                fi
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  lint:
    name: Lint (in parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run lint
  typecheck:
    name: Type Check
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run typecheck
  test:
    name: Unit Test (in parallel) (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        node-version: [24.x]
        experimental: [false]
        include:
          - node-version: 25.x
            experimental: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Rebuild native bindings for current platform
        run: npm rebuild
      - run: npm run build
      - name: Vitest with Optional Datadog Tracing
        run: |
          if [[ -n "${{ secrets.DATADOG_CICD_API_KEY }}" ]]; then
            echo "Run tests with Datadog tracing"
            npm install dd-trace --save-dev
            npm rebuild
            export DD_CIVISIBILITY_AGENTLESS_ENABLED=true
            export DD_API_KEY=${{ secrets.DATADOG_CICD_API_KEY }}
            export DD_SITE=datadoghq.com
            # Additional steps to test CDK, still using CommonJS :(
            NODE_OPTIONS='--import dd-trace/register.js -r dd-trace/ci/init' DD_ENV=${{ env.PROJECT_ENV }} DD_SERVICE=${{ env.PROJECT_SERVICE }} npm run test
          else
            npm test
          fi
  build-llm:
    name: Build (LLM matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Package build artifact
        run: tar -czf llm-dist.tar.gz packages/*/dist
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-dist
          path: llm-dist.tar.gz
          retention-days: 1
  test-llm-matrix:
    name: LLM Capability Matrix (${{ matrix.group }})
    needs: build-llm
    environment: sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: anthropic
            models: "claude-sonnet-4-5,claude-sonnet-4-6,claude-sonnet-5,claude-opus-4-7,claude-opus-4-8,claude-haiku-4-5"
          - group: openai
            models: "gpt-5.4,gpt-5.4-mini,gpt-5.4-nano,gpt-5.5,gpt-5.6-sol,gpt-5.6-terra,gpt-5.6-luna"
          - group: gemini-xai
            models: "gemini-3.1-pro-preview,gemini-3.5-flash,gemini-3.1-flash-lite,grok-latest,grok-4.3-latest,grok-4.20-0309-reasoning,grok-4.20-0309-non-reasoning,grok-4-1-fast-reasoning,grok-4-1-fast-non-reasoning"
          - group: openrouter
            models: "anthropic/claude-sonnet-4.6,anthropic/claude-sonnet-5,google/gemini-3.1-pro-preview,openai/gpt-5.5,openai/gpt-5.6-luna,x-ai/grok-4.20,z-ai/glm-5.2"
          - group: bedrock
            models: "us.anthropic.claude-opus-4-7,us.anthropic.claude-sonnet-4-6,us.anthropic.claude-haiku-4-5-20251001-v1:0,amazon.nova-pro-v1:0,us.amazon.nova-2-lite-v1:0,amazon.nova-micro-v1:0,deepseek.v3.2,google.gemma-3-27b-it,moonshotai.kimi-k2.5,openai.gpt-oss-120b-1:0"
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-dist
      - name: Extract build artifact
        run: tar -xzf llm-dist.tar.gz
      - name: Configure AWS credentials (sandbox role)
        if: matrix.group == 'bedrock'
        uses: ./.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Fetch Bedrock test role ARN
        if: matrix.group == 'bedrock'
        id: bedrock-role
        run: |
          ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name jaypie-cicd \
            --query "Stacks[0].Outputs[?OutputKey=='BedrockCicdRoleArn'].OutputValue" \
            --output text)
          echo "arn=$ROLE_ARN" >> $GITHUB_OUTPUT
      - name: Assume Bedrock test role
        if: matrix.group == 'bedrock'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.bedrock-role.outputs.arn }}
          role-session-name: BedrockLlmTestSession
          aws-region: ${{ vars.AWS_REGION }}
      - name: Run LLM Capability Matrix (${{ matrix.group }})
        run: LOG_LEVEL=warn APP_MODELS="${{ matrix.models }}" npm run test:llm:matrix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CICD_ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.CICD_GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.CICD_OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.CICD_OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.CICD_XAI_API_KEY }}
