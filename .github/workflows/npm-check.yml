name: NPM Check

on:
  push:
    branches:
      - branch/*
      - claude/*
      - codex/*
      - devin/*
      - fix/*
      - feat/*
    tags:
      - check-*

env:
  PROJECT_COMMIT: ${{ github.sha }}
  PROJECT_ENV: meta
  PROJECT_SERVICE: libraries

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint (in parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run lint
  typecheck:
    name: Type Check
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run typecheck
  test:
    name: Unit Test (in parallel) (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        node-version: [24.x]
        experimental: [false]
        include:
          - node-version: 25.x
            experimental: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Rebuild native bindings for current platform
        run: npm rebuild
      - run: npm run build
      - run: npm test
  test-llm-matrix:
    name: LLM Capability Matrix (${{ matrix.group }})
    environment: sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: anthropic
            models: "claude-sonnet-4-5,claude-sonnet-4-6,claude-opus-4-5,claude-opus-4-6,claude-opus-4-7,claude-haiku-4-5"
          - group: openai
            models: "gpt-5,gpt-5.4,gpt-5.4-mini,gpt-5.4-nano,gpt-5.5"
          - group: gemini-xai
            models: "gemini-3.1-pro-preview,gemini-3-flash-preview,gemini-3.1-flash-lite-preview,grok-latest,grok-4.3-latest,grok-4-1-fast-reasoning,grok-4-1-fast-non-reasoning"
          - group: openrouter
            models: "anthropic/claude-sonnet-4.6,google/gemini-3.1-pro-preview,openai/gpt-5.5,x-ai/grok-4.20"
          - group: bedrock
            models: "us.anthropic.claude-opus-4-7,us.anthropic.claude-sonnet-4-6,us.anthropic.claude-haiku-4-5-20251001-v1:0,amazon.nova-pro-v1:0,us.amazon.nova-2-lite-v1:0,amazon.nova-micro-v1:0,deepseek.v3.2,google.gemma-3-27b-it,moonshotai.kimi-k2.5,openai.gpt-oss-120b-1:0"
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            llm:
              - 'packages/llm/**'
      - name: Use Node.js 24
        if: steps.changes.outputs.llm == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        if: steps.changes.outputs.llm == 'true'
        run: npm install
      - name: Build
        if: steps.changes.outputs.llm == 'true'
        run: npm run build
      - name: Configure AWS credentials (sandbox role)
        if: steps.changes.outputs.llm == 'true' && matrix.group == 'bedrock'
        uses: ./.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Fetch Bedrock test role ARN
        if: steps.changes.outputs.llm == 'true' && matrix.group == 'bedrock'
        id: bedrock-role
        run: |
          ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name jaypie-cicd \
            --query "Stacks[0].Outputs[?OutputKey=='BedrockCicdRoleArn'].OutputValue" \
            --output text)
          echo "arn=$ROLE_ARN" >> $GITHUB_OUTPUT
      - name: Assume Bedrock test role
        if: steps.changes.outputs.llm == 'true' && matrix.group == 'bedrock'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.bedrock-role.outputs.arn }}
          role-session-name: BedrockLlmTestSession
          aws-region: ${{ vars.AWS_REGION }}
      - name: Run LLM Capability Matrix (${{ matrix.group }})
        if: steps.changes.outputs.llm == 'true'
        run: LOG_LEVEL=warn APP_MODELS="${{ matrix.models }}" npm run test:llm:matrix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CICD_ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.CICD_GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.CICD_OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.CICD_OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.CICD_XAI_API_KEY }}

  test-llm-matrix-complete:
    name: LLM Capability Matrix (conditional)
    needs: test-llm-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix group results
        run: |
          result="${{ needs.test-llm-matrix.result }}"
          if [[ "$result" == "failure" ]]; then
            echo "One or more LLM matrix groups failed"
            exit 1
          fi
          echo "All LLM matrix groups passed (result: $result)"
