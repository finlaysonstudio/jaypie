name: NPM Check

on:
  push:
    branches:
      - branch/*
      - claude/*
      - codex/*
      - deps/*
      - devin/*
      - fix/*
      - feat/*
    tags:
      - check-*

env:
  PROJECT_COMMIT: ${{ github.sha }}
  PROJECT_ENV: meta
  PROJECT_SERVICE: libraries

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint (in parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run lint
  typecheck:
    name: Type Check
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run typecheck
  test:
    name: Unit Test (in parallel) (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        node-version: [24.x]
        experimental: [false]
        include:
          - node-version: 25.x
            experimental: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Rebuild native bindings for current platform
        run: npm rebuild
      - run: npm run build
      - run: npm test
  build-llm:
    name: Build (LLM matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      llm_changed: ${{ steps.changes.outputs.llm }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            llm:
              - 'packages/llm/**'
      - name: Use Node.js 24
        if: steps.changes.outputs.llm == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        if: steps.changes.outputs.llm == 'true'
        run: npm install
      - name: Build
        if: steps.changes.outputs.llm == 'true'
        run: npm run build
      - name: Package build artifact
        if: steps.changes.outputs.llm == 'true'
        run: tar -czf llm-dist.tar.gz packages/*/dist
      - name: Upload build artifact
        if: steps.changes.outputs.llm == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: llm-dist
          path: llm-dist.tar.gz
          retention-days: 1
  test-llm-matrix:
    name: LLM Capability Matrix (${{ matrix.group }})
    needs: build-llm
    environment: sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: anthropic
            providers: "anthropic"
          - group: openai
            providers: "openai"
          - group: gemini-xai
            providers: "google,xai"
          - group: openrouter
            providers: "openrouter"
          - group: bedrock
            providers: "bedrock"
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        if: needs.build-llm.outputs.llm_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        if: needs.build-llm.outputs.llm_changed == 'true'
        run: npm install
      - name: Download build artifact
        if: needs.build-llm.outputs.llm_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: llm-dist
      - name: Extract build artifact
        if: needs.build-llm.outputs.llm_changed == 'true'
        run: tar -xzf llm-dist.tar.gz
      - name: Configure AWS credentials (sandbox role)
        if: needs.build-llm.outputs.llm_changed == 'true' && matrix.group == 'bedrock'
        uses: ./.github/actions/configure-aws
        with:
          role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Fetch Bedrock test role ARN
        if: needs.build-llm.outputs.llm_changed == 'true' && matrix.group == 'bedrock'
        id: bedrock-role
        run: |
          ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name jaypie-cicd \
            --query "Stacks[0].Outputs[?OutputKey=='BedrockCicdRoleArn'].OutputValue" \
            --output text)
          echo "arn=$ROLE_ARN" >> $GITHUB_OUTPUT
      - name: Assume Bedrock test role
        if: needs.build-llm.outputs.llm_changed == 'true' && matrix.group == 'bedrock'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.bedrock-role.outputs.arn }}
          role-session-name: BedrockLlmTestSession
          aws-region: ${{ vars.AWS_REGION }}
      - name: Run LLM Capability Matrix (${{ matrix.group }})
        if: needs.build-llm.outputs.llm_changed == 'true'
        run: LOG_LEVEL=warn APP_GROUP="${{ matrix.providers }}" npm run test:llm:matrix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CICD_ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.CICD_GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.CICD_OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.CICD_OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.CICD_XAI_API_KEY }}

  test-llm-matrix-complete:
    name: LLM Capability Matrix (conditional)
    needs: [build-llm, test-llm-matrix]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix group results
        run: |
          build="${{ needs.build-llm.result }}"
          result="${{ needs.test-llm-matrix.result }}"
          if [[ "$build" == "failure" ]]; then
            echo "LLM build failed"
            exit 1
          fi
          if [[ "$result" == "failure" ]]; then
            echo "One or more LLM matrix groups failed"
            exit 1
          fi
          echo "All LLM matrix groups passed (result: $result)"
