name: NPM Check

on:
  push:
    branches:
      - branch/*
      - claude/*
      - codex/*
      - devin/*
      - fix/*
      - feat/*
    tags:
      - check-*

env:
  PROJECT_COMMIT: ${{ github.sha }}
  PROJECT_ENV: meta
  PROJECT_SERVICE: libraries

jobs:
  lint:
    name: Lint (in parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run lint
  typecheck:
    name: Type Check
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run typecheck
  test:
    name: Unit Test (in parallel) (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        node-version: [24.x]
        experimental: [false]
        include:
          - node-version: 25.x
            experimental: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Rebuild native bindings for current platform
        run: npm rebuild
      - run: npm run build
      - run: npm test
  test-llm-client:
    name: LLM Client Test (conditional)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            llm:
              - 'packages/llm/**'
      - name: Use Node.js 24
        if: steps.changes.outputs.llm == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        if: steps.changes.outputs.llm == 'true'
        run: npm install
      - name: Build
        if: steps.changes.outputs.llm == 'true'
        run: npm run build
      - name: Run LLM Client Tests
        if: steps.changes.outputs.llm == 'true'
        run: LOG_LEVEL=trace npm run test:llm:all
        env:
          APP_PROVIDER: anthropic,google,openai,xai
          ANTHROPIC_API_KEY: ${{ secrets.CICD_ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.CICD_GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.CICD_OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.CICD_XAI_API_KEY }}
